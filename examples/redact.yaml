# Default bind is 0.0.0.0:<capture_port>. Set capture_bind explicitly to restrict
# the capture port to a specific interface (e.g. 127.0.0.1:8080 for a sidecar
# topology, or a private NIC). When capture_bind is set, capture_port is ignored.
# capture_bind: "127.0.0.1:8080"
capture_port: 8080

queue_size: 1024
body_cap: 1048576  # 1 MiB
workers: 2

sinks:
  stdout: true
  memory: true
  memory_capacity: 1000
  sqlite: false
  sqlite_path: ./httpcatch.db

admin:
  bind: 127.0.0.1:8081
  # token comes from HTTPCATCH_ADMIN_TOKEN env var
  session_ttl: 8h

redaction:
  # Header values replaced with [REDACTED] (case-insensitive match).
  headers:
    - authorization
    - proxy-authorization
    - x-api-key
    - x-auth-token
    - x-secret
    - x-access-token
    - x-id-token

  # Query parameter values replaced with [REDACTED] (case-insensitive name match).
  query_params:
    - api_key
    - apikey
    - token
    - access_token
    - auth_token
    - secret
    - password
    - pass
    - passwd
    - key

  # JSON body paths replaced with [REDACTED] (gjson dot-notation) whenever the
  # body parses as JSON, regardless of the declared content type. Nested paths
  # use dots: "user.password".
  json_paths:
    - password
    - pass
    - passwd
    - pwd
    - secret
    - token
    - access_token
    - refresh_token
    - id_token
    - api_key
    - client_secret
    - private_key
    - pin
    - card_number
    - cvv
    - cvc
    - ssn
    - user.password
    - user.secret
    - credentials.password
    - credentials.secret
    - auth.token
    - auth.secret
    - card.number
    - card.cvv

  # Regex rules scan every non-empty body and all header/query values. Each
  # match is replaced in full with [REDACTED].
  # Patterns use RE2 syntax (no lookaheads).
  regex:
    # password=<value> in URL-encoded form bodies and query strings
    - name: password_in_form
      pattern: '(?i)(?:password|passwd|pass|pwd)=[^&\s]+'

    # common secret/key/token params in URL-encoded form bodies
    - name: secret_in_form
      pattern: '(?i)(?:secret|api[_-]?key|access[_-]?token|client[_-]?secret|auth[_-]?token)=[^&\s]+'

    # password attributes inside XML bodies: <password>value</password>
    - name: password_in_xml
      pattern: '(?i)(<(?:\w+:)?(?:password|passwd|pass|secret)>)[^<]+(</)'

    # Bearer and Basic auth tokens wherever they appear in text
    - name: bearer_token
      pattern: '(?i)\bBearer\s+[A-Za-z0-9\-._~+/=]+'

    - name: basic_auth
      pattern: '(?i)\bBasic\s+[A-Za-z0-9+/=]+'

    # Luhn-valid-shaped card numbers (Visa, Mastercard, Amex, Discover)
    - name: credit_card_number
      pattern: '\b(?:4[0-9]{12}(?:[0-9]{3})?|[25][1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'

  # Cookie handling. Rules are applied in order; each rule's mode applies only
  # to its listed names. Modes: redact (replace value), strip (remove cookie
  # entirely), allowlist (keep only listed, strip all others).
  cookies:
    # Replace session and auth cookie values with [REDACTED].
    - mode: redact
      names:
        - session
        - sessionid
        - auth
        - token
        - access_token
        - refresh_token
        - id_token
        - jwt
        - remember_me
        - remember_token

    # Strip tracking/analytics cookies entirely — they add noise and no value.
    - mode: strip
      names:
        - _ga
        - _gid
        - _fbp
        - _fbc
        - __stripe_mid
        - __stripe_sid
        - _hjid
        - _hjSessionUser
