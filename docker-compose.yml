services:
  httpcatch:
    build:
      context: .
      dockerfile: Dockerfile
    image: httpcatch:dev
    container_name: httpcatch
    ports:
      - "8080:8080"
      # bind admin port to loopback only; use a reverse proxy or SSH tunnel for remote access
      - "127.0.0.1:8081:8081"
    environment:
      HTTPCATCH_SINKS: "sqlite,memory"
      HTTPCATCH_SQLITE_PATH: "/var/lib/httpcatch/httpcatch.db"
      HTTPCATCH_ADMIN_BIND: "0.0.0.0:8081"
      # require an explicit token; no default so docker compose up fails fast if unset
      HTTPCATCH_ADMIN_TOKEN: "${HTTPCATCH_ADMIN_TOKEN:?HTTPCATCH_ADMIN_TOKEN must be set; see README/NOTES}"
    volumes:
      - httpcatch-data:/var/lib/httpcatch
    restart: unless-stopped

volumes:
  httpcatch-data:
