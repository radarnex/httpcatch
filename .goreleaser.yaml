version: 2

project_name: httpcatch

before:
  hooks:
    - go mod download

builds:
  - id: httpcatch
    main: ./cmd/httpcatch
    binary: httpcatch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/radarnex/httpcatch/internal/buildinfo.Version={{ .Version }}
      - -X github.com/radarnex/httpcatch/internal/buildinfo.BuildTime={{ .Date }}

archives:
  - id: httpcatch
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - examples/**/*

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: radarnex
    name: httpcatch
  draft: false
  prerelease: auto
