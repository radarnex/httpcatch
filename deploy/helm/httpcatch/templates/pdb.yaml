{{- if and .Values.podDisruptionBudget.enabled (not .Values.persistence.enabled) (gt (int .Values.replicaCount) 1) }}
{{- if and .Values.podDisruptionBudget.minAvailable .Values.podDisruptionBudget.maxUnavailable }}
{{- fail "podDisruptionBudget.minAvailable and podDisruptionBudget.maxUnavailable are mutually exclusive; set only one." }}
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "httpcatch.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "httpcatch.labels" . | nindent 4 }}
  {{- include "httpcatch.annotations" (dict "ctx" .) | nindent 2 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- else }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "httpcatch.selectorLabels" . | nindent 6 }}
{{- end }}
