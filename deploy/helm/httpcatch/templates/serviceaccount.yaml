{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "httpcatch.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "httpcatch.labels" . | nindent 4 }}
  {{- include "httpcatch.annotations" (dict "ctx" . "extra" .Values.serviceAccount.annotations) | nindent 2 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- with .Values.image.pullSecrets }}
imagePullSecrets:
{{ toYaml . }}
{{- end }}
{{- end }}
