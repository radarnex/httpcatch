<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>httpcatch — log in</title>
<script src="/static/theme-init.js"></script>
<link rel="stylesheet" href="/static/app.css">
<link rel="stylesheet" href="/static/login.css">
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <span class="brand-mark">/h</span>
    <b>httpcatch</b>
  </div>
  {{if .Error}}<div class="login-error">Invalid token. Please try again.</div>{{end}}
  <form method="POST" action="/auth/login">
    {{if .Next}}<input type="hidden" name="next" value="{{.Next}}">{{end}}
    <label class="login-label" for="token">Admin token</label>
    <input class="login-input" type="password" id="token" name="token" autocomplete="current-password" autofocus>
    <button class="login-submit" type="submit">Log in</button>
  </form>
</div>
</body>
</html>
